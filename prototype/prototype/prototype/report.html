<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>گزارش تردد</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>گزارش تردد خودروها</h1>

    <table class="report-table">
      <thead>
        <tr>
          <th>پلاک</th>
          <th>راننده</th>
          <th>زمان ورود</th>
          <th>زمان خروج</th>
          <th>وضعیت</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>123ABC</td>
          <td>علی رضایی</td>
          <td>08:15</td>
          <td>10:30</td>
          <td>خروج عادی</td>
        </tr>
        <tr>
          <td>456DEF</td>
          <td>مینا احمدی</td>
          <td>11:00</td>
          <td>-</td>
          <td>داخل پارکینگ</td>
        </tr>
        <tr>
          <td>789XYZ</td>
          <td>حسین محمدی</td>
          <td>12:20</td>
          <td>12:45</td>
          <td>خروج اضطراری</td>
        </tr>
      </tbody>
    </table>

    <a class="back-link" href="index.html">بازگشت به صفحه اصلی</a>
  </div>
</body>
</html>
