<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خروج اضطراری</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container form-page">
    <h1>خروج اضطراری</h1>
    <div class="form-box">
      <label>شماره پلاک</label>
      <input id="emergencyPlate" type="text" placeholder="مثال: 123ABC" />

      <label>علت خروج اضطراری</label>
      <textarea id="emergencyReason" rows="4" placeholder="مثلاً خرابی خودرو یا شرایط خاص"></textarea>

      <div class="actions">
        <button onclick="approveEmergency()">تأیید خروج اضطراری</button>
        <button onclick="registerFine()">ثبت جریمه</button>
      </div>

      <div id="emergencyResult" class="result"></div>
    </div>

    <a class="back-link" href="index.html">بازگشت به صفحه اصلی</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
