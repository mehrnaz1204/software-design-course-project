<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت ورود خودرو</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container form-page">
    <h1>ثبت ورود خودرو</h1>
    <div class="form-box">
      <label>شماره پلاک</label>
      <input id="entryPlate" type="text" placeholder="مثال: 123ABC" />

      <label>نوع خودرو</label>
      <select id="vehicleType">
        <option>سواری</option>
        <option>وانت</option>
        <option>موتور</option>
      </select>

      <label>نام راننده</label>
      <input id="driverName" type="text" placeholder="نام راننده" />

      <div class="actions">
        <button onclick="checkPlate()">بررسی پلاک</button>
        <button onclick="registerEntry()">ثبت ورود</button>
      </div>

      <div id="entryResult" class="result"></div>
    </div>

    <a class="back-link" href="index.html">بازگشت به صفحه اصلی</a>
  </div>

  <script src="script.js"></script>
</body>
                                                   </html>
